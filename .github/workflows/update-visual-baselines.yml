name: Update visual baselines (Linux)

# 手動実行専用。Linux(CI)環境のビジュアル基準画像を生成して、
# 実行したブランチへコミットし返す。これを1回回すと、以後 CI でも
# ビジュアル回帰を比較できるようになる（ローカルmacの基準とはOS接尾辞で別管理）。
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium webkit
      - name: Update snapshots
        run: npm run update-snapshots
      - name: Commit baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/**/*.png
          if git diff --cached --quiet; then
            echo "基準画像に差分なし"
          else
            git commit -m "chore: Linux ビジュアル基準画像を更新 [skip ci]"
            git push
          fi
